spring.application.name=sistema-crm
# Usa variables para que Railway las llene solo al desplegar
spring.r2dbc.url=r2dbc:pool:postgres://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.r2dbc.username=${PGUSER}
spring.r2dbc.password=${PGPASSWORD}

# Configuracion para que reconozca los tipos de datos correctamente
spring.r2dbc.properties.schema=public

# Esto es vital para que cree las tablas en Postgres
spring.sql.init.mode=always